<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spend Reality</title>
  <link rel="stylesheet" href="style.css">
  <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
<body>
  <header>
    <div class="header">
      <h1>Spend Reality</h1>
      <h4>Your salary vs your desires — made visible.</h4>
    </div>
    <div class="themeToggle">
       <i id="day" class="ri-sun-fill"></i>
       <i id="night" class="ri-moon-line"></i>
    </div>
  </header>

  <div class="mainScreen">
    <input type="number" name="price" id="price" placeholder="Enter Price of the Product" required>
    <input type="text" name="itemName" id="itemName" placeholder="Enter Name of the Product">
    <input type="number" name="hourWage" id="hourWage" placeholder="Enter your Hourly Wage">


     <h3>Or</h3>
    <input type="number" name="monthlySalary" id="monthlySalary" placeholder="Enter your Monthly Salary">

    <button id="generateReport">Generate Report</button>
  </div>

<div id="overlay">
  <div class="reportModal">

    <div class="reportHeader">
      <h2>Spend Reality Report</h2>
      <p>Financial Impact Breakdown</p>
    </div>

    <div class="reportBody">
      <div class="row"><span>Product</span><span id="rProduct"></span></div>
      <div class="row"><span>Price</span><span id="rPrice"></span></div>

      <hr>

      <div class="row"><span>Hours Needed</span><span id="rHours"></span></div>
      <div class="row"><span>Days Needed</span><span id="rDays"></span></div>

      <div class="row"><span>Monthly Impact</span><span id="rImpact"></span></div>
    </div>

    <div class="impactBox" id="impactBox">
      🔴 High Impact Purchase
    </div>

    <button id="closeBtn">Close</button>

  </div>
</div>
</div>




<script src="script.js"></script>
</body>
</html>
